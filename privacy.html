<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy - Lich Trong Dong</title>
  <meta name="description" content="Privacy Policy for Lich Trong Dong, a Vietnamese perpetual calendar app with lunar calendar, solar calendar, reminders, widgets, optional weather, and Vietnamese holidays." />
  <meta name="keywords" content="Lich Trong Dong, Vietnamese calendar, lunar calendar Vietnam, solar lunar calendar, Vietnamese holidays, calendar reminders, Android calendar widget, privacy policy" />
  <meta name="robots" content="index,follow" />
  <style>
    :root {
      --bg: #f5efe6;
      --bg2: #efe3d4;
      --surface: rgba(255, 252, 246, .82);
      --surface-strong: rgba(255, 249, 240, .94);
      --line: rgba(173, 99, 56, .2);
      --text: #332c25;
      --muted: #6f6256;
      --soft: #8b7d70;
      --primary: #ad6338;
      --secondary: #2f7b70;
      --shadow: rgba(91, 68, 44, .16);
      font-family: "Segoe UI", "Noto Sans", Arial, sans-serif;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(213,160,57,.18), transparent 30%),
        radial-gradient(circle at top right, rgba(47,123,112,.14), transparent 28%),
        linear-gradient(135deg, var(--bg), var(--bg2));
      padding: 20px 14px 42px;
    }
    .page { max-width: 980px; margin: 0 auto; }
    .glass {
      background: linear-gradient(135deg, var(--surface-strong), var(--surface));
      border: 1px solid var(--line);
      box-shadow: 0 20px 44px var(--shadow), inset 0 1px 0 rgba(255,255,255,.7);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .hero {
      border-radius: 30px;
      padding: 26px;
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 20px;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(173,99,56,.14), transparent 68%);
      pointer-events: none;
    }
    .logo {
      width: 112px;
      height: 112px;
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid rgba(173,99,56,.28);
      background: #fff8ef;
      box-shadow: 0 14px 28px rgba(86, 55, 28, .18);
      position: relative;
      z-index: 1;
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    h1 { margin: 0; font-size: clamp(30px, 4vw, 44px); letter-spacing: -.03em; }
    h2 { margin: 8px 0 0; font-size: clamp(16px, 2vw, 20px); color: var(--primary); }
    .intro { margin: 14px 0 0; color: var(--muted); line-height: 1.75; font-size: 15.5px; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(173, 99, 56, .09);
      border: 1px solid rgba(173, 99, 56, .18);
      color: #6b3a20;
      font-size: 13px;
      font-weight: 800;
    }
    .langbar {
      margin-top: 16px;
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.52);
      border: 1px solid rgba(173,99,56,.16);
      position: relative;
      z-index: 2;
    }
    .lang-btn {
      border: 0;
      border-radius: 999px;
      padding: 8px 14px;
      background: transparent;
      color: var(--muted);
      font-weight: 850;
      cursor: pointer;
      transition: .2s ease;
    }
    .lang-btn.active {
      background: rgba(173, 99, 56, .14);
      color: #6b3a20;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.64);
    }
    .note {
      margin-top: 16px;
      border-radius: 20px;
      padding: 14px 16px;
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.65;
    }
    .content { margin-top: 18px; display: grid; gap: 14px; }
    .section { border-radius: 24px; padding: 22px; }
    .section h3 {
      margin: 0 0 10px;
      font-size: clamp(18px, 2.2vw, 23px);
      letter-spacing: -.01em;
    }
    .section p, .section li { color: var(--muted); font-size: 15px; line-height: 1.78; }
    .section ul { margin: 10px 0 0; padding-left: 20px; }
    .section a { color: var(--secondary); font-weight: 800; text-decoration: none; }
    .section a:hover { text-decoration: underline; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(47, 123, 112, .1);
      border: 1px solid rgba(47, 123, 112, .18);
      color: #24584f;
      font-size: 13px;
      font-weight: 850;
    }
    .footer { margin-top: 18px; border-radius: 22px; padding: 16px 18px; color: var(--soft); font-size: 13px; line-height: 1.65; }
    @media (max-width: 720px) {
      body { padding: 14px 10px 32px; }
      .hero { grid-template-columns: 1fr; padding: 22px; }
      .logo { width: 92px; height: 92px; border-radius: 22px; }
      .section { padding: 18px; }
    }
  </style>
</head>

    function applyLanguage(lang) {
      const d = policy[lang] || policy.en;
      document.documentElement.lang = d.htmlLang;
      document.title = lang === "vi"
        ? "Chính Sách Quyền Riêng Tư - Lịch Trống Đồng"
        : "Privacy Policy - Lich Trong Dong";
      document.querySelector("meta[name='description']").setAttribute("content", d.description);
      document.getElementById("title").textContent = d.title;
      document.getElementById("subtitle").textContent = d.subtitle;
      document.getElementById("intro").textContent = d.intro;
      document.getElementById("note").textContent = d.note;
      document.getElementById("footer").textContent = d.footer;

      const chips = document.getElementById("chips");
      chips.innerHTML = "";
      d.chips.forEach((text) => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = text;
        chips.appendChild(chip);
      });

      const content = document.getElementById("content");
      content.innerHTML = "";
      sections.forEach((key) => {
        const article = document.createElement("article");
        article.className = "section glass";
        article.innerHTML = `<span class="badge">${d[`${key}Title`]}</span><h3>${d[`${key}Heading`]}</h3>${d[`${key}Html`]}`;
        content.appendChild(article);
      });

      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });
      localStorage.setItem("lichTrongDongPrivacyLang", lang);
    }

    document.querySelectorAll(".lang-btn").forEach((button) => {
      button.addEventListener("click", () => applyLanguage(button.dataset.lang));
    });

    const params = new URLSearchParams(window.location.search);
    const requested = params.get("lang");
    applyLanguage(requested === "vi" ? "vi" : "en");
  </script>
